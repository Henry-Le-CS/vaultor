name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-14          # Apple Silicon runner
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/vaultor/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/vaultor/package-lock.json

      - name: Install frontend dependencies
        run: cd apps/vaultor && npm ci

      - name: Build frontend
        run: cd apps/vaultor && npm run build

      - name: Run tests
        run: |
          cd apps/vaultor/src-tauri
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test

      - name: Build Tauri app
        run: cd apps/vaultor && npm run tauri -- build

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename DMG
        run: |
          DMG_SRC=$(ls apps/vaultor/src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_SRC" ]; then
            cp "$DMG_SRC" "Vaultor-${{ steps.version.outputs.VERSION }}-macos.dmg"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vaultor v${{ steps.version.outputs.VERSION }}
          body: |
            ## Vaultor v${{ steps.version.outputs.VERSION }}

            ### Install

            **Option A — Download the DMG**
            1. Download `Vaultor-${{ steps.version.outputs.VERSION }}-macos.dmg` below
            2. Open the DMG and drag Vaultor into Applications
            3. On first launch: right-click → Open → Open (unsigned app workaround)

            **Option B — One-line install**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ### Requirements
            - macOS 13 (Ventura) or later
            - Mac with TouchID
          files: |
            Vaultor-${{ steps.version.outputs.VERSION }}-macos.dmg
            apps/vaultor/src-tauri/target/release/bundle/macos/Vaultor.app
          draft: false
          prerelease: false
