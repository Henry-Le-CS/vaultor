name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-14          # Apple Silicon runner
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/vaultor/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/vaultor/package-lock.json

      - name: Bump version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: bump
        run: |
          CURRENT=$(grep '^version' apps/vaultor/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ inputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION ($BUMP)"

          # Update Cargo.toml
          sed -i '' "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" apps/vaultor/src-tauri/Cargo.toml

          # Update tauri.conf.json
          sed -i '' "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW_VERSION\"/" apps/vaultor/src-tauri/tauri.conf.json

          # Update package.json
          sed -i '' "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW_VERSION\"/" apps/vaultor/package.json

      - name: Extract version (tag push)
        if: github.event_name == 'push'
        id: tag_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set VERSION env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ steps.bump.outputs.VERSION }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${{ steps.tag_version.outputs.VERSION }}" >> "$GITHUB_ENV"
          fi

      - name: Install frontend dependencies
        run: cd apps/vaultor && npm ci

      - name: Build frontend
        run: cd apps/vaultor && npm run build

      - name: Run tests
        run: |
          cd apps/vaultor/src-tauri
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test

      - name: Build Tauri app
        run: cd apps/vaultor && npm run tauri -- build

      - name: Commit version bump & create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/vaultor/src-tauri/Cargo.toml apps/vaultor/src-tauri/Cargo.lock apps/vaultor/src-tauri/tauri.conf.json apps/vaultor/package.json
          git commit -m "chore: bump version to $VERSION"
          git tag "v$VERSION"
          git push origin main --tags

      - name: Rename DMG
        run: |
          DMG_SRC=$(ls apps/vaultor/src-tauri/target/release/bundle/dmg/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_SRC" ]; then
            cp "$DMG_SRC" "Vaultor-${VERSION}-macos.dmg"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Vaultor v${{ env.VERSION }}
          body: |
            ## Vaultor v${{ env.VERSION }}

            ### Install

            **Option A — Download the DMG**
            1. Download `Vaultor-${{ env.VERSION }}-macos.dmg` below
            2. Open the DMG and drag Vaultor into Applications
            3. On first launch: right-click → Open → Open (unsigned app workaround)

            **Option B — One-line install**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ### Requirements
            - macOS 13 (Ventura) or later
            - Mac with TouchID
          files: |
            Vaultor-${{ env.VERSION }}-macos.dmg
            apps/vaultor/src-tauri/target/release/bundle/macos/Vaultor.app
          draft: false
          prerelease: false
